<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Primeiro acesso | NavalhaOS</title>
  <link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<meta name="theme-color" content="#071222">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="NavalhaOS">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NavalhaOS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no"></head>
<body class="password-page">
  <section class="password-shell first-setup-shell">
    <div class="password-card first-setup-card">
      <div class="password-head">
        <img src="assets/logo.png" alt="NavalhaOS">
        <h1>Configure o primeiro acesso</h1>
        <p>Defina a senha definitiva e complete os dados principais da barbearia e do administrador.</p>
      </div>
      <div class="password-box">Essas informações ficam salvas no cadastro da barbearia e ajudam na identificação, cobrança e organização do sistema.</div>

      <form id="changePasswordForm" class="form">
        <h3 class="form-section-title">Senha de acesso</h3>
        <div class="row">
          <div class="field">
            <label>Nova senha</label>
            <div class="input-with-action">
              <input id="newPassword" type="password" required minlength="6" placeholder="Digite a nova senha">
              <button type="button" class="toggle-pass" id="toggleNewPassword">Ver</button>
            </div>
          </div>
          <div class="field">
            <label>Confirmar nova senha</label>
            <div class="input-with-action">
              <input id="confirmPassword" type="password" required minlength="6" placeholder="Confirme a nova senha">
              <button type="button" class="toggle-pass" id="toggleConfirmPassword">Ver</button>
            </div>
          </div>
        </div>

        <h3 class="form-section-title">Administrador</h3>
        <div class="field">
          <label>Nome do administrador</label>
          <input id="adminName" required placeholder="Ex: João Silva">
        </div>
        <div class="row">
          <div class="field">
            <label>CPF do administrador</label>
            <input id="adminCpf" required inputmode="numeric" autocomplete="off" placeholder="000.000.000-00">
          </div>
          <div class="field">
            <label>Celular do administrador</label>
            <input id="adminPhone" required inputmode="tel" autocomplete="tel" placeholder="(27) 99999-9999">
          </div>
        </div>

        <h3 class="form-section-title">Barbearia</h3>
        <div class="field">
          <label>Nome da barbearia</label>
          <input id="barbershopName" required placeholder="Ex: Barbearia Navalha">
        </div>
        <div class="row">
          <div class="field">
            <label>CNPJ da barbearia</label>
            <input id="barbershopCnpj" required inputmode="numeric" autocomplete="off" placeholder="00.000.000/0001-00">
          </div>
          <div class="field">
            <label>Celular da barbearia</label>
            <input id="barbershopPhone" required inputmode="tel" autocomplete="tel" placeholder="(27) 99999-9999">
          </div>
        </div>

        <button class="btn primary full" type="submit">Salvar dados e acessar</button>
      </form>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/change-password.js"></script>
<script src="js/pwa.js"></script></body>
</html>
