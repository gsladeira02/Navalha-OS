<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Definir nova senha | NavalhaOS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="password-page">
  <section class="password-shell">
    <div class="password-card">
      <div class="password-head">
        <img src="assets/logo.png" alt="NavalhaOS">
        <h1>Defina sua nova senha</h1>
        <p>No primeiro acesso, é necessário atualizar a senha para continuar usando o sistema com segurança.</p>
      </div>
      <div class="password-box">Use uma senha forte e fácil de guardar. Depois da alteração, você seguirá normalmente para o dashboard.</div>
      <form id="changePasswordForm" class="form">
        <div class="field">
          <label>Nova senha</label>
          <div class="input-with-action">
            <input id="newPassword" type="password" required minlength="6" placeholder="Digite a nova senha">
            <button type="button" class="toggle-pass" id="toggleNewPassword">Ver</button>
          </div>
        </div>
        <div class="field">
          <label>Confirmar nova senha</label>
          <div class="input-with-action">
            <input id="confirmPassword" type="password" required minlength="6" placeholder="Confirme a nova senha">
            <button type="button" class="toggle-pass" id="toggleConfirmPassword">Ver</button>
          </div>
        </div>
        <button class="btn primary full" type="submit">Salvar nova senha</button>
      </form>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/change-password.js"></script>
</body>
</html>
