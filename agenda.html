<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agenda | NavalhaOS</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app"><aside class="sidebar"><div class="brand"><div class="logo">N</div><div><h1>NavalhaOS</h1><p>Gestão afiada</p></div></div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="agenda.html">Agenda</a><a href="clientes.html">Clientes</a><a href="barbeiros.html">Barbeiros</a><a href="servicos.html">Serviços</a><a href="caixa.html">Caixa</a><a href="comissoes.html">Comissões</a></nav><div class="sidebar-footer"><button id="logoutBtn" class="btn danger full">Sair</button></div></aside><main class="main"><div class="topbar"><div class="title"><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div><div class="userbox">Logado como<br><strong id="userEmail"></strong></div></div><section class="grid two"><div class="card"><h3>Novo horário</h3><form id="form" class="form"><div class="field"><label>Cliente cadastrado</label><select id="customer_id"></select></div><div class="row"><div class="field"><label>Nome do cliente</label><input id="customer_name" required></div><div class="field"><label>Telefone</label><input id="customer_phone"></div></div><div class="row"><div class="field"><label>Barbeiro</label><select id="barber_id" required></select></div><div class="field"><label>Serviço</label><select id="service_id" required></select></div></div><div class="row"><div class="field"><label>Data</label><input id="appointment_date" type="date" required></div><div class="field"><label>Status</label><select id="status"><option value="marcado">Marcado</option><option value="confirmado">Confirmado</option></select></div></div><div class="row"><div class="field"><label>Início</label><input id="start_time" type="time" required></div><div class="field"><label>Fim</label><input id="end_time" type="time"></div></div><div class="field"><label>Valor</label><input id="price" type="number" min="0" step="0.01" required></div><div class="field"><label>Observações</label><textarea id="notes"></textarea></div><button class="btn primary">Marcar horário</button></form></div><div class="card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h3>Horários</h3><input id="filterDate" type="date" style="max-width:180px;background:#0d0d11;color:white;border:1px solid var(--border);border-radius:12px;padding:10px"></div><div class="table-wrap"><table class="table"><thead><tr><th>Hora</th><th>Cliente</th><th>Barbeiro</th><th>Serviço</th><th>Status</th><th>Valor</th><th></th></tr></thead><tbody id="rows"></tbody></table></div></div></section></main></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/supabase-client.js"></script><script src="js/app.js"></script><script src="js/agenda.js"></script></body></html>
