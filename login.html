<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Entrar | NavalhaOS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <section class="login-shell login-shell-simple">
    <div class="login-panel login-card login-card-simple">
      <div class="login-card-head center">
        <img class="login-logo" src="assets/logo.png" alt="NavalhaOS">
        <h2>Acesse sua barbearia</h2>
        <p class="subtle">Entre com o e-mail e a senha liberados para sua assinatura.</p>
      </div>

      <div class="auth-note">O cadastro não é público. O acesso é liberado após a contratação do NavalhaOS.</div>

      <div class="login-form-wrap">
        <form id="loginForm" class="form">
          <div class="field">
            <label>E-mail</label>
            <input id="email" type="email" required placeholder="cliente@barbearia.com">
          </div>
          <div class="field">
            <label>Senha</label>
            <div class="input-with-action">
              <input id="password" type="password" required placeholder="Digite sua senha">
              <button type="button" class="toggle-pass" id="togglePassword">Ver</button>
            </div>
          </div>
          <div class="login-actions">
            <button class="btn primary full" type="submit">Entrar no sistema</button>
          </div>
        </form>

        <div class="login-helper">
          <p class="subtle">Se o acesso ainda não foi liberado, fale com o responsável pela assinatura.</p>
          <div class="login-footer-note">Acesso exclusivo para clientes ativos</div>
        </div>
      </div>

      <div class="legal-links"><a href="privacidade.html">Privacidade</a><span>•</span><a href="termos.html">Termos</a></div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
