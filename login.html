<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Entrar | NavalhaOS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page login-page-clean">
  <section class="login-clean-shell">
    <div class="login-clean-card">
      <img class="login-clean-logo" src="assets/logo.png" alt="NavalhaOS">
      <h1>NavalhaOS</h1>
      <p class="login-clean-subtitle">Acesse sua barbearia</p>
      <form id="loginForm" class="form login-clean-form">
        <div class="field">
          <label>E-mail</label>
          <input id="email" type="email" required placeholder="cliente@barbearia.com">
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="input-with-action">
            <input id="password" type="password" required placeholder="Digite sua senha">
            <button type="button" class="toggle-pass" id="togglePassword">Ver</button>
          </div>
        </div>
        <button class="btn primary full" type="submit">Entrar</button>
      </form>
      <div class="login-clean-meta"><span>Acesso exclusivo para clientes ativos</span></div>
      <div class="legal-links">
        <a href="privacidade.html">Privacidade</a>
        <span>•</span>
        <a href="termos.html">Termos</a>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
