<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Caixa | NavalhaOS</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app"><aside class="sidebar"><div class="brand"><div class="logo">N</div><div><h1>NavalhaOS</h1><p>Gestão afiada</p></div></div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="agenda.html">Agenda</a><a href="clientes.html">Clientes</a><a href="barbeiros.html">Barbeiros</a><a href="servicos.html">Serviços</a><a href="caixa.html">Caixa</a><a href="comissoes.html">Comissões</a></nav><div class="sidebar-footer"><button id="logoutBtn" class="btn danger full">Sair</button></div></aside><main class="main"><div class="topbar"><div class="title"><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div><div class="userbox">Logado como<br><strong id="userEmail"></strong></div></div><section class="grid cards"><div class="card metric"><span>Entradas</span><strong id="totalIn">R$ 0,00</strong></div><div class="card metric"><span>Saídas</span><strong id="totalOut">R$ 0,00</strong></div><div class="card metric"><span>Resultado</span><strong id="totalNet">R$ 0,00</strong></div><div class="card"><label style="color:var(--muted);font-size:13px">Filtrar data</label><input id="filterDate" type="date" style="width:100%;margin-top:8px;background:#0d0d11;color:white;border:1px solid var(--border);border-radius:12px;padding:10px"></div></section><section class="grid two" style="margin-top:16px"><div class="card"><h3>Novo lançamento</h3><form id="form" class="form"><div class="row"><div class="field"><label>Tipo</label><select id="type"><option value="entrada">Entrada</option><option value="saida">Saída</option></select></div><div class="field"><label>Data</label><input id="entry_date" type="date" required></div></div><div class="field"><label>Descrição</label><input id="description" required></div><div class="row"><div class="field"><label>Valor</labe
